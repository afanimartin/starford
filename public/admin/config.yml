backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "string", default: "News" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Link URL", name: "href", widget: "string", default: "/news", required: false }

  - name: "site_copy"
    label: "Site Copy"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/site/home.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Primary CTA Label", name: "primaryCtaLabel", widget: "string" }
              - { label: "Secondary CTA Label", name: "secondaryCtaLabel", widget: "string" }
          - label: "Slides"
            name: "slides"
            widget: "list"
            summary: "{{fields.headline}}"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

      - label: "About Page"
        name: "about"
        file: "content/site/about.json"
        fields:
          - { label: "Hero Badge", name: "heroBadge", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Story Kicker", name: "storyKicker", widget: "string" }
          - { label: "Story Title", name: "storyTitle", widget: "string" }
          - label: "Mission"
            name: "mission"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Vision"
            name: "vision"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }

      - label: "Admissions Page"
        name: "admissions"
        file: "content/site/admissions.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Key Dates"
            name: "keyDates"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
