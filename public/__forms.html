<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form
      name="contact"
      method="POST"
      action="/"
      data-netlify="true"
      netlify-honeypot="bot-field"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="first_name" />
      <input type="text" name="last_name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <form
      name="student-application"
      method="POST"
      action="/"
      data-netlify="true"
      netlify-honeypot="bot-field"
    >
      <input type="hidden" name="form-name" value="student-application" />
      <input type="text" name="first_name" />
      <input type="text" name="middle_name" />
      <input type="text" name="last_name" />
      <input type="text" name="date_of_birth" />
      <input type="text" name="gender" />
      <input type="text" name="nationality" />
      <input type="text" name="marital_status" />
      <input type="text" name="religion" />
      <input type="text" name="county" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <textarea name="address"></textarea>
      <input type="text" name="school_name" />
      <input type="text" name="graduation_year" />
      <input type="text" name="certificate" />
      <input type="text" name="previous_university" />
      <input type="text" name="intake" />
      <input type="text" name="college" />
      <input type="text" name="programme" />
      <input type="text" name="mode_of_study" />
      <input type="text" name="doc_certificate" />
      <input type="text" name="doc_identity" />
      <input type="text" name="doc_passport" />
      <input type="text" name="doc_photos" />
      <input type="text" name="doc_fee" />
      <input type="text" name="declaration" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
